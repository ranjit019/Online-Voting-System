{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2 style="margin:0 0 8px 0">Create your voter account</h2>
  <form method="post">
    <div class="grid">
      <div>
        <label>Full Name</label>
        <input name="name" required placeholder="e.g., Ranjit Pawar"/>
      </div>
      <div>
        <label>Email</label>
        <input name="email" type="email" required placeholder="you@example.com"/>
      </div>
    </div>
    <label>Password</label>
    <input name="password" type="password" required placeholder="••••••••"/>
    <button class="btn primary" type="submit">Create Account</button>
  </form>
</div>
{% endblock %}
